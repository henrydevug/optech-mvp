<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Op-tech Sales</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }

    .nav {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

<!-- NAVIGATION -->
<div class="nav">
  <button onclick="goBack()">⬅ Back</button>
  <button onclick="loadTotals()">🔄 Refresh</button>
</div>

<!-- SALES INPUT -->
<div class="card">
  <h2>Make Sale</h2>

  <input id="itemName" placeholder="Item Name" type="text"><br><br>
  <input id="saleQty" placeholder="Quantity" type="number"><br><br>
  <input id="salePrice" placeholder="Selling Price" type="number"><br>

  <button onclick="addSale()">💰 Add Sale</button>
</div>

<!-- DASHBOARD -->
<div class="card">
  <h3 id="todaySales">Sales: UGX 0</h3>
  <h3 id="todayProfit">Profit: UGX 0</h3>
</div>

<!-- RECEIPT -->
<div id="receiptBox" class="card"></div>

<script>
let sales = JSON.parse(localStorage.getItem("sales")) || [];

// =====================
// 💰 ADD SALE
// =====================
function addSale() {
  const itemName = document.getElementById("itemName").value.trim();
  const qty = Number(document.getElementById("saleQty").value);
  const price = Number(document.getElementById("salePrice").value);

  if (!itemName || !qty || !price) {
    return alert("Fill all fields");
  }

  const total = qty * price;

  // simple profit estimate (you can upgrade later with buying price)
  const profit = total * 0.2;

  const receipt = {
    product: itemName,
    quantity: qty,
    sellingPrice: price,
    total,
    profit,
    date: new Date().toLocaleDateString()
  };

  sales.push(receipt);

  localStorage.setItem("sales", JSON.stringify(sales));
  localStorage.setItem("lastReceipt", JSON.stringify(receipt));

  document.getElementById("itemName").value = "";
  document.getElementById("saleQty").value = "";
  document.getElementById("salePrice").value = "";

  loadTotals();
  loadReceipt();
}

// =====================
// 📊 TOTALS
// =====================
function loadTotals() {
  const sales = JSON.parse(localStorage.getItem("sales")) || [];
  const today = new Date().toLocaleDateString();

  let totalSales = 0;
  let totalProfit = 0;

  sales.forEach(s => {
    if (s.date === today) {
      totalSales += s.total;
      totalProfit += s.profit;
    }
  });

  document.getElementById("todaySales").innerText =
    `Sales: UGX ${totalSales}`;

  document.getElementById("todayProfit").innerText =
    `Profit: UGX ${totalProfit}`;
}

// =====================
// 🧾 RECEIPT
// =====================
function loadReceipt() {
  const receipt = JSON.parse(localStorage.getItem("lastReceipt"));
  if (!receipt) return;

  document.getElementById("receiptBox").innerHTML = `
    <h3>Last Receipt</h3>
    <p><b>Item:</b> ${receipt.product}</p>
    <p><b>Qty:</b> ${receipt.quantity}</p>
    <p><b>Price:</b> UGX ${receipt.sellingPrice}</p>
    <p><b>Total:</b> UGX ${receipt.total}</p>
    <p><b>Profit:</b> UGX ${receipt.profit}</p>
    <p><b>Date:</b> ${receipt.date}</p>
  `;
}

// =====================
// ⬅ BACK BUTTON
// =====================
function goBack() {
  window.history.back();
}

// INIT
loadTotals();
loadReceipt();
</script>

</body>
</html>
