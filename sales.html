<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sales System</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .receipt { border: 1px solid #ccc; padding: 10px; margin-top: 10px; }
  </style>
</head>

<body>

  <h2>Sales Dashboard</h2>

  <input id="saleQty" placeholder="Quantity" type="number">
  <input id="salePrice" placeholder="Selling Price" type="number">
  <button onclick="addSale()">Add Sale</button>

  <h3 id="todaySales">Sales: UGX 0</h3>
  <h3 id="todayProfit">Profit: UGX 0</h3>

  <div id="receiptBox"></div>

<script>
let sales = JSON.parse(localStorage.getItem("sales")) || [];
let stock = JSON.parse(localStorage.getItem("stock")) || [];

// =====================
// 💰 ADD SALE
// =====================
function addSale() {
  const qty = Number(document.getElementById("saleQty").value);
  const price = Number(document.getElementById("salePrice").value);

  if (!qty || !price) return alert("Enter quantity and price");

  // assume last product for simplicity (you can improve later)
  const item = stock[stock.length - 1];
  if (!item) return alert("No stock found");

  const productName = item.name;

  const total = qty * price;
  const profit = (price - item.buyingPrice) * qty;

  item.quantity -= qty;

  const receipt = {
    product: productName,
    quantity: qty,
    sellingPrice: price,
    total,
    profit,
    date: new Date().toLocaleDateString()
  };

  sales.push(receipt);

  localStorage.setItem("stock", JSON.stringify(stock));
  localStorage.setItem("sales", JSON.stringify(sales));
  localStorage.setItem("lastReceipt", JSON.stringify(receipt));

  document.getElementById("saleQty").value = "";
  document.getElementById("salePrice").value = "";

  loadTotals();
  loadReceipt();
}

// =====================
// 📊 TOTALS
// =====================
function loadTotals() {
  const sales = JSON.parse(localStorage.getItem("sales")) || [];
  const today = new Date().toLocaleDateString();

  let totalSales = 0;
  let totalProfit = 0;

  sales.forEach(s => {
    if (s.date === today) {
      totalSales += s.total;
      totalProfit += s.profit;
    }
  });

  document.getElementById("todaySales").innerText =
    `Sales: UGX ${totalSales}`;

  document.getElementById("todayProfit").innerText =
    `Profit: UGX ${totalProfit}`;
}

// =====================
// 🧾 RECEIPT
// =====================
function loadReceipt() {
  const receipt = JSON.parse(localStorage.getItem("lastReceipt"));
  if (!receipt) return;

  document.getElementById("receiptBox").innerHTML = `
    <div class="receipt">
      <p><strong>Product:</strong> ${receipt.product}</p>
      <p><strong>Qty:</strong> ${receipt.quantity}</p>
      <p><strong>Price:</strong> UGX ${receipt.sellingPrice}</p>
      <p><strong>Total:</strong> UGX ${receipt.total}</p>
      <p><strong>Profit:</strong> UGX ${receipt.profit}</p>
      <p><strong>Date:</strong> ${receipt.date}</p>
    </div>
  `;
}

loadTotals();
loadReceipt();
</script>

</body>
</html>
