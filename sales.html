<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Record Sale - Op-tech</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f6fa;
    margin:0;
    padding:15px;
}
.header{
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}
.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
label{
    font-weight:bold;
    display:block;
    margin-top:15px;
}
input, select{
    width:100%;
    padding:14px;
    margin-top:8px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    background:#27ae60;
    color:white;
    cursor:pointer;
}
.sales-list{
    margin-top:20px;
}
.sale-item{
    background:white;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
</style>
</head>
<body>

<div class="header">🛒 Record Sale</div>

<div class="card">
    <label>Select Item</label>
    <select id="productName">
        <option value="">Choose item</option>
    </select>

    <label>Quantity Sold</label>
    <input type="number" id="qty" placeholder="Enter quantity sold">

    <label>Selling Price</label>
    <input type="number" id="price" placeholder="Enter selling price">

    <button onclick="saveSale()">💰 Save Sale</button>
</div>

<div class="sales-list" id="salesList"></div>

<script>
let stock = JSON.parse(localStorage.getItem("stock")) || [];
let sales = JSON.parse(localStorage.getItem("sales")) || [];

function loadProducts(){
    const dropdown = document.getElementById("productName");
    dropdown.innerHTML = '<option value="">Choose item</option>';

    stock.forEach(item=>{
        dropdown.innerHTML += `
            <option value="${item.name}">
                ${item.name} (${item.quantity} left)
            </option>
        `;
    });
}

function saveSale(){
    const productName = document.getElementById("productName").value;
    const qty = parseInt(document.getElementById("qty").value);
    const price = parseInt(document.getElementById("price").value);

    if(!productName || !qty || !price){
        alert("Please fill all fields");
        return;
    }

    let item = stock.find(i => i.name === productName);

    if(!item){
        alert("Item not found");
        return;
    }

    if(item.quantity < qty){
        alert("Not enough stock");
        return;
    }

    const total = qty * price;
    const profit = (price - item.buyingPrice) * qty;

    item.quantity -= qty;

    sales.push({
        product:productName,
        quantity:qty,
        sellingPrice:price,
        total:total,
        profit:profit,
        date:new Date().toLocaleDateString()
    });

    localStorage.setItem("stock", JSON.stringify(stock));
    localStorage.setItem("sales", JSON.stringify(sales));

    document.getElementById("qty").value = "";
    document.getElementById("price").value = "";

    loadProducts();
    loadSales();
    alert("Sale saved successfully");
}

function loadSales(){
    const salesList = document.getElementById("salesList");
    salesList.innerHTML = "";

    sales.slice().reverse().forEach(sale=>{
        salesList.innerHTML += `
            <div class="sale-item">
                <strong>${sale.product}</strong><br>
                Qty: ${sale.quantity}<br>
                Total: UGX ${sale.total}<br>
                Profit: UGX ${sale.profit}
            </div>
        `;
    });
}

loadProducts();
loadSales();
</script>
<div class="bottom-nav">
    <a href="dashboard.html">📊 Home</a>
    <a href="stock.html">📦 Stock</a>
    <a href="sales.html">🛒 Sales</a>
    <a href="reports.html">📑 Reports</a>
</div>

<style>
.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:white;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    box-shadow:0 -2px 8px rgba(0,0,0,0.08);
    padding:10px 0;
}
.bottom-nav a{
    text-align:center;
    text-decoration:none;
    color:#333;
    font-size:14px;
    font-weight:bold;
}
body{
    padding-bottom:80px;
}
</style>
</body>
</html>
