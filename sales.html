<!DOCTYPE html>
<html>
    <head><link rel="stylesheet" href="style.css"> </head>
<body>
<form onsubmit="saveSale(event)">
    <input type="text" id="saleProduct" placeholder="Product">
    <input type="number" id="saleQty" placeholder="Qty">
    <input type="number" id="salePrice" placeholder="Selling Price">
    <button>Save Sale</button><button onclick="addSale()">Add Sale</button>
</form>
<script>
function saveSale(event) {
    event.preventDefault();
    let stock = JSON.parse(localStorage.getItem('stock')) || [];
    let sales = JSON.parse(localStorage.getItem('sales')) || [];
    let item = stock.find(i => i.product.toLowerCase() === saleProduct.value.toLowerCase());
    let qty = parseInt(saleQty.value);
    let sp = parseInt(salePrice.value);
    let profit = (sp - item.buyingPrice) * qty;
    item.quantity -= qty;
    sales.push({product:item.product, quantity:qty, sellingPrice:sp, profit:profit, date:new Date().toLocaleDateString()});
    localStorage.setItem('stock', JSON.stringify(stock));
    localStorage.setItem('sales', JSON.stringify(sales));
}
    <script src="script.js"></script>
</script>
</body>
</html>
