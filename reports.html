<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports - Op-tech</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f6fa;
    margin:0;
    padding:15px;
}
.header{
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}
.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
    margin-bottom:15px;
}
input, button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}
input{
    border:1px solid #ccc;
}
button{
    border:none;
    background:#3498db;
    color:white;
    font-weight:bold;
}
.sale-item{
    padding:12px 0;
    border-bottom:1px solid #eee;
}
</style>
</head>
<body>

<div class="header">📑 Reports</div>

<div class="card">
    <label>Select Date</label>
    <input type="date" id="reportDate">
    <button onclick="filterReports()">🔍 Filter</button>
</div>

<div class="card">
    <div>💰 Total Sales: <strong id="totalSales">UGX 0</strong></div>
    <div>📈 Total Profit: <strong id="totalProfit">UGX 0</strong></div>
    <div>🏆 Best Seller: <strong id="bestSeller">None</strong></div>
</div>

<div class="card">
    <h3>🧾 Sales History</h3>
    <div id="salesHistory"></div>
</div>

<script>
let sales = JSON.parse(localStorage.getItem("sales")) || [];

function filterReports(){
    const selectedDate = document.getElementById("reportDate").value;
    const history = document.getElementById("salesHistory");

    history.innerHTML = "";

    let filtered = sales;

    if(selectedDate){
        const formatted = new Date(selectedDate).toLocaleDateString();
        filtered = sales.filter(s => s.date === formatted);
    }

    let totalSales = filtered.reduce((sum,s)=>sum+s.total,0);
    let totalProfit = filtered.reduce((sum,s)=>sum+s.profit,0);

    document.getElementById("totalSales").textContent = "UGX " + totalSales;
    document.getElementById("totalProfit").textContent = "UGX " + totalProfit;

    let itemCount = {};
    filtered.forEach(s=>{
        itemCount[s.product] = (itemCount[s.product] || 0) + s.quantity;
    });

    let bestSeller = "None";
    let max = 0;

    for(let item in itemCount){
        if(itemCount[item] > max){
            max = itemCount[item];
            bestSeller = item;
        }
    }

    document.getElementById("bestSeller").textContent = bestSeller;

    if(filtered.length === 0){
        history.innerHTML = "<p>No sales found</p>";
        return;
    }

    filtered.slice().reverse().forEach(sale=>{
        history.innerHTML += `
            <div class="sale-item">
                <strong>${sale.product}</strong><br>
                Qty: ${sale.quantity}<br>
                Total: UGX ${sale.total}<br>
                Profit: UGX ${sale.profit}
            </div>
        `;
    });
}

filterReports();
</script>
<div class="bottom-nav">
    <a href="dashboard.html">📊 Home</a>
    <a href="stock.html">📦 Stock</a>
    <a href="sales.html">🛒 Sales</a>
    <a href="reports.html">📑 Reports</a>
</div>

<style>
.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:white;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    box-shadow:0 -2px 8px rgba(0,0,0,0.08);
    padding:10px 0;
}
.bottom-nav a{
    text-align:center;
    text-decoration:none;
    color:#333;
    font-size:14px;
    font-weight:bold;
}
body{
    padding-bottom:80px;
}
</style>
</body>
</html>
