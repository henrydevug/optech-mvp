<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Op-tech Ledger MVP</title>
</head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Op-tech Ledger</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f8fafc;
  color: #0f172a;
}

.page {
  display: none;
  padding: 20px;
}

.page.active {
  display: block;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  margin-top: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border: none;
  border-radius: 12px;
  background: #0f172a;
  color: white;
  font-size: 16px;
  font-weight: bold;
}

.nav-btns {
  display: flex;
  gap: 10px;
}

.nav-btns button {
  flex: 1;
}
</style>
</head>
  <nav class="navbar">
  <div class="logo">Op-tech Ledger</div>

  <div class="nav-links">
    <a href="#" class="active">Dashboard</a>
    <a href="#">Transactions</a>
    <a href="#">Reports</a>
    <a href="#">Settings</a>
  </div>

  <div class="menu-btn">☰</div>
</nav>
<body>

<!-- PAGE 1 -->
<div class="page active" id="home">
  <h1>Welcome to Op-tech</h1>
  <p>Manage your business easily.</p>

  <div class="card">
    <h2>Total Sales: UGX 0</h2>
    <button onclick="showPage('sales')">💰 Record Sale</button>
    <button onclick="showPage('stock')">📦 Manage Stock</button>
    <button onclick="showPage('reports')">📊 View Reports</button>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="sales">
  <h2>💰 Record Sale</h2>
  <div class="card">
    <input type="number" placeholder="Enter amount" style="width:100%;padding:12px;">
    <div class="nav-btns">
      <button onclick="showPage('home')">⬅ Back</button>
      <button onclick="showPage('stock')">Next ➜</button>
    </div>
  </div>
</div>

<!-- PAGE 3 -->
<div class="page" id="stock">
  <h2>📦 Manage Stock</h2>
  <div class="card">
    <input type="text" placeholder="Item name" style="width:100%;padding:12px;">
    <div class="nav-btns">
      <button onclick="showPage('sales')">⬅ Back</button>
      <button onclick="showPage('reports')">Next ➜</button>
    </div>
  </div>
</div>

<!-- PAGE 4 -->
<div class="page" id="reports">
  <h2>📊 Reports</h2>
  <div class="card">
    <p>Sales and stock reports will appear here.</p>
    <button onclick="showPage('stock')">⬅ Back</button>
  </div>
</div>

<script>
function showPage(pageId) {
  const pages = document.querySelectorAll('.page');
  pages.forEach(page => page.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}
</script>

</body>
</html>
