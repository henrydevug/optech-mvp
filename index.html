<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Op-tech Ledger</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">Op-tech</div>

  <nav class="nav-links" id="navLinks">
    <a href="#dashboard" class="active">Dashboard</a>
    <a href="#transactions">Transactions</a>
    <a href="#reports">Reports</a>
    <a href="#settings">Settings</a>
  </nav>

  <button class="menu-btn" onclick="toggleMenu()">☰</button>
</header>

<!-- DASHBOARD -->
<section id="dashboard" class="page active">
  <h1>Dashboard</h1>

  <div class="grid">
    <div class="card">💰 Balance<br><strong>UGX 0</strong></div>
    <div class="card">📥 Income<br><strong>UGX 0</strong></div>
    <div class="card">📤 Expenses<br><strong>UGX 0</strong></div>
    <div class="card">📊 Transactions<br><strong>0</strong></div>
  </div>
</section>

<!-- TRANSACTIONS -->
<section id="transactions" class="page">
  <h1>Transactions</h1>

  <div class="card">
    <input type="date" id="date" style="width:100%;padding:10px;margin-bottom:10px;">
    
    <input type="text" id="desc" placeholder="Description"
      style="width:100%;padding:10px;margin-bottom:10px;">

    <select id="type" style="width:100%;padding:10px;margin-bottom:10px;">
      <option value="Income">Income</option>
      <option value="Expense">Expense</option>
    </select>

    <input type="number" id="amount" placeholder="Amount"
      style="width:100%;padding:10px;margin-bottom:10px;">

    <button onclick="addTransaction()">Add Transaction</button>
  </div>

  <div class="card" style="margin-top:20px; overflow-x:auto;">
    <table id="transactionTable" style="width:100%; border-collapse: collapse;">
      <thead>
        <tr>
          <th>Date</th>
          <th>Description</th>
          <th>Type</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody id="transactionBody"></tbody>
    </table>
  </div>
</section>

<!-- REPORTS -->
<section id="reports" class="page">
  <h1>Reports</h1>

  <div class="card">
    <p>Reports will appear here.</p>
  </div>
</section>

<!-- SETTINGS -->
<section id="settings" class="page">
  <h1>Settings</h1>

  <div class="card">
    <p>App settings coming soon.</p>
  </div>
</section>
<script>
function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("show");
}

document.querySelectorAll(".nav-links a").forEach(link => {
  link.addEventListener("click", () => {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.querySelector(link.getAttribute("href")).classList.add("active");

    document.querySelectorAll(".nav-links a").forEach(a => a.classList.remove("active"));
    link.classList.add("active");

    document.getElementById("navLinks").classList.remove("show");
  });
});

let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

function renderTransactions() {
  const body = document.getElementById("transactionBody");
  body.innerHTML = "";

  transactions.forEach(tx => {
    body.innerHTML += `
      <tr>
        <td>${tx.date}</td>
        <td>${tx.desc}</td>
        <td>${tx.type}</td>
        <td>UGX ${tx.amount}</td>
      </tr>
    `;
  });
}

function addTransaction() {
  const date = document.getElementById("date").value;
  const desc = document.getElementById("desc").value;
  const type = document.getElementById("type").value;
  const amount = document.getElementById("amount").value;

  if (!date || !desc || !amount) {
    alert("Please fill all fields");
    return;
  }

  transactions.push({ date, desc, type, amount });

  localStorage.setItem("transactions", JSON.stringify(transactions));

  renderTransactions();

  document.getElementById("date").value = "";
  document.getElementById("desc").value = "";
  document.getElementById("amount").value = "";
}

renderTransactions();
</script>
</body>
</html>
