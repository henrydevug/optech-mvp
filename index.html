<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Op-tech System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <h2>OP-TECH</h2>
  <nav>
    <button onclick="showPage('dashboard')">Dashboard</button>
    <button onclick="showPage('ledger')">Ledger</button>
    <button onclick="showPage('inventory')">Inventory</button>
  </nav>
</header>

<main>

<!-- DASHBOARD -->
<section id="dashboard" class="page active">
  <h1>Dashboard</h1>

  <div class="grid">
    <div class="card">
      <h3>Today Sales</h3>
      <p id="todaySales">UGX 0</p>
    </div>

    <div class="card">
      <h3>Profit</h3>
      <p id="profit">UGX 0</p>
    </div>

    <div class="card">
      <h3>Low Stock</h3>
      <p id="lowStock">0</p>
    </div>
  </div>
</section>

<!-- LEDGER -->
<section id="ledger" class="page">
  <h1>Ledger</h1>

  <input id="customer" placeholder="Customer">
  <input id="item" placeholder="Item">
  <input id="amount" type="number" placeholder="Amount">

  <button onclick="addSale()">Add Sale</button>

  <div id="salesList"></div>
</section>

<!-- INVENTORY -->
<section id="inventory" class="page">
  <h1>Inventory</h1>

  <input id="stockItem" placeholder="Item">
  <input id="stockQty" type="number" placeholder="Quantity">

  <button onclick="addStock()">Add Stock</button>

  <div id="stockList"></div>
</section>

</main>

<footer>
  © 2026 Op-tech | Mobile Fintech MVP
</footer>

<script src="script.js"></script>
</body>
</html>
