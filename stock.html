<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Stock - Op-tech</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f6fa;
    margin:0;
    padding:15px;
}
.header{
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}
.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
label{
    font-weight:bold;
    display:block;
    margin-top:15px;
}
input{
    width:100%;
    padding:14px;
    margin-top:8px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    background:#3498db;
    color:white;
    cursor:pointer;
}
.stock-list{
    margin-top:20px;
}
.stock-item{
    background:white;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
</style>
</head>
<body>

<div class="header">➕ Add Stock</div>

<div class="card">
    <label>Item Name</label>
    <input type="text" id="itemName" placeholder="Enter item name">

    <label>Buying Price</label>
    <input type="number" id="buyingPrice" placeholder="Enter buying price">

    <label>Quantity</label>
    <input type="number" id="quantity" placeholder="Enter quantity">

    <button onclick="saveStock()">💾 Save Stock</button>
</div>

<div class="stock-list" id="stockList"></div>

<script>
let stock = JSON.parse(localStorage.getItem("stock")) || [];

function saveStock(){
    const itemName = document.getElementById("itemName").value.trim();
    const buyingPrice = parseInt(document.getElementById("buyingPrice").value);
    const quantity = parseInt(document.getElementById("quantity").value);

    if(!itemName || !buyingPrice || !quantity){
        alert("Please fill all fields");
        return;
    }

    stock.push({
        name:itemName,
        buyingPrice:buyingPrice,
        quantity:quantity
    });

    localStorage.setItem("stock", JSON.stringify(stock));

    document.getElementById("itemName").value = "";
    document.getElementById("buyingPrice").value = "";
    document.getElementById("quantity").value = "";

    loadStock();
    alert("Stock saved successfully");
}

function loadStock(){
    const stockList = document.getElementById("stockList");
    stockList.innerHTML = "";

    stock.forEach(item=>{
        stockList.innerHTML += `
            <div class="stock-item">
                <strong>${item.name}</strong><br>
                Buying: UGX ${item.buyingPrice}<br>
                Qty: ${item.quantity}
            </div>
        `;
    });
}

loadStock();
</script>
<div class="bottom-nav">
    <a href="index.html">📊 Home</a>
    <a href="stock.html">📦 Stock</a>
    <a href="sales.html">🛒 Sales</a>
    <a href="reports.html">📑 Reports</a>
</div>

<style>
.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:white;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    box-shadow:0 -2px 8px rgba(0,0,0,0.08);
    padding:10px 0;
}
.bottom-nav a{
    text-align:center;
    text-decoration:none;
    color:#333;
    font-size:14px;
    font-weight:bold;
}
body{
    padding-bottom:80px;
}
</style>
</body>
</html>
