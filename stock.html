<!DOCTYPE html>
<html>
    <head><link rel="stylesheet" href="style.css"></head>
<body>
<form onsubmit="saveStock(event)">
    <input type="text" id="product" placeholder="Product">
    <input type="number" id="quantity" placeholder="Quantity">
    <input type="number" id="buyingPrice" placeholder="Buying Price">
    <button>Add Stock</button>
</form>
<div id="stockList"></div>

    <script src="script.js"></script>
    <script>
function saveStock(event){
 event.preventDefault();
 let stock = JSON.parse(localStorage.getItem('stock')) || [];
 stock.push({
   product: product.value,
   quantity: parseInt(quantity.value),
   buyingPrice: parseInt(buyingPrice.value)
 });
 localStorage.setItem('stock', JSON.stringify(stock));
 displayStock();
}
function displayStock(){
 let stock = JSON.parse(localStorage.getItem('stock')) || [];
 stockList.innerHTML = stock.map(item => `<p>${item.product} - ${item.quantity}</p>`).join('');
}
displayStock();
</script>
</body>
</html>
